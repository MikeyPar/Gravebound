name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  quality:
    name: Format, lint, and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Rust toolchain
        run: rustup show active-toolchain
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace --locked
      - name: Validate First Playable content
        run: cargo run --locked -p tools_content -- validate
      - name: Verify deterministic trace
        run: |
          cargo run --locked -p tools_content -- trace tests/deterministic/m00_smoke.json
          cargo run --locked -p tools_content -- trace tests/deterministic/m00_smoke.json
      - name: Verify generated schemas are current
        shell: bash
        run: |
          cargo run --locked -p tools_content -- generate-schemas
          git diff --exit-code -- schemas

  windows-release:
    name: Windows release build
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Rust toolchain
        run: rustup show active-toolchain
      - name: Build client
        run: cargo build --locked --release -p client_bevy
