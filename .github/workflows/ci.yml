name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  quality:
    name: Format, lint, and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RUSTFLAGS: -C link-arg=-fuse-ld=lld
    steps:
      - uses: actions/checkout@v5
      - name: Install Linux window dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes clang lld libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev
      - name: Install pinned Rust toolchain
        run: rustup show active-toolchain
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace --locked
      - name: Validate First Playable content
        run: cargo run --locked -p tools_content -- validate
      - name: Validate unpromoted Core Sir Caldus content
        run: cargo run --locked -p tools_content -- validate-core-caldus
      - name: Verify deterministic trace
        run: |
          cargo run --locked -p tools_content -- trace tests/deterministic/m00_smoke.json
          cargo run --locked -p tools_content -- trace tests/deterministic/m00_smoke.json
      - name: Verify generated schemas are current
        shell: bash
        run: |
          cargo run --locked -p tools_content -- generate-schemas
          git diff --exit-code -- schemas

  windows-release:
    name: Windows release build
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - name: Install pinned Rust toolchain
        run: rustup show active-toolchain
      - name: Build client
        run: cargo build --locked --release -p client_bevy

  postgres-persistence:
    name: PostgreSQL migrations and transactions
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:17.10-alpine3.23
        env:
          POSTGRES_DB: gravebound_test
          POSTGRES_USER: gravebound_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 127.0.0.1:5432:5432
        options: >-
          --health-cmd "pg_isready -U gravebound_test -d gravebound_test"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30
    env:
      RUSTFLAGS: -C link-arg=-fuse-ld=lld
      TEST_DATABASE_URL: postgres://gravebound_test@127.0.0.1:5432/gravebound_test
      GRAVEBOUND_ALLOW_DESTRUCTIVE_DATABASE_TESTS: "1"
    steps:
      - uses: actions/checkout@v5
      - name: Install Linux integration dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes clang lld libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev
      - name: Install pinned Rust toolchain
        run: rustup show active-toolchain
      - name: Run mandatory PostgreSQL gate
        run: |
          cargo test --locked -p persistence --test postgres_foundation -- --ignored --test-threads=1
          cargo test --locked -p server_app --test postgres_progression_restore -- --ignored --test-threads=1
          cargo test --locked -p server_app --test postgres_world_flow -- --ignored --test-threads=1
          cargo test --locked -p server_app --test postgres_bargain -- --ignored --test-threads=1
          cargo test --locked -p server_app --test postgres_ash_wallet -- --ignored --test-threads=1
          cargo test --locked -p server_app --test postgres_identity -- --ignored --test-threads=1
