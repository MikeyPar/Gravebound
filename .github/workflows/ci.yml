name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      run_m03_death_soak:
        description: Run the explicit release-profile 30-minute GB-M03-06E death persistence soak
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  quality:
    name: Format, lint, and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RUSTFLAGS: -C link-arg=-fuse-ld=lld
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"
    steps:
      - uses: actions/checkout@v5
      - name: Install Linux window dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes clang lld libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev
      - name: Install pinned Rust toolchain
        run: rustup show active-toolchain
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace --locked
      - name: Validate First Playable content
        run: cargo run --locked -p tools_content -- validate
      - name: Validate unpromoted Core Sir Caldus content
        run: cargo run --locked -p tools_content -- validate-core-caldus
      - name: Validate unpromoted Core death presentation
        run: cargo run --locked -p tools_content -- validate-core-death-view
      - name: Validate unpromoted Core successor recovery presentation
        run: cargo run --locked -p tools_content -- validate-core-successor-recovery
      - name: Verify deterministic trace
        run: |
          cargo run --locked -p tools_content -- trace tests/deterministic/m00_smoke.json
          cargo run --locked -p tools_content -- trace tests/deterministic/m00_smoke.json
      - name: Verify generated schemas are current
        shell: bash
        run: |
          cargo run --locked -p tools_content -- generate-schemas
          git diff --exit-code -- schemas

  windows-release:
    name: Windows release build
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - name: Install pinned Rust toolchain
        run: rustup show active-toolchain
      - name: Build client
        run: cargo build --locked --release -p client_bevy

  postgres-persistence:
    name: PostgreSQL migrations and transactions
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:17.10-alpine3.23
        env:
          POSTGRES_DB: gravebound_test
          POSTGRES_USER: gravebound_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 127.0.0.1:5432:5432
        options: >-
          --health-cmd "pg_isready -U gravebound_test -d gravebound_test"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30
    env:
      RUSTFLAGS: -C link-arg=-fuse-ld=lld
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_DEV_DEBUG: "0"
      TEST_DATABASE_URL: postgres://gravebound_test@127.0.0.1:5432/gravebound_test
      GRAVEBOUND_ALLOW_DESTRUCTIVE_DATABASE_TESTS: "1"
    steps:
      - uses: actions/checkout@v5
      - name: Install Linux integration dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes clang lld libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev
      - name: Install pinned Rust toolchain
        run: rustup show active-toolchain
      - name: Run mandatory PostgreSQL gate
        env:
          GRAVEBOUND_SUCCESSOR_JOURNEY_REPORT_PATH: ${{ runner.temp }}/gb-m03-07-successor-recovery.json
        run: |
          cargo test --locked -p persistence --test postgres_foundation -- --ignored --test-threads=1
          cargo test --locked -p persistence --test postgres_telemetry_sources -- --ignored --test-threads=1 --nocapture
          cargo test --locked -p persistence --test postgres_production_extraction_intent -- --ignored --test-threads=1 --nocapture
          cargo test --locked -p persistence --test postgres_extraction_terminal -- --ignored --test-threads=1 --nocapture
          cargo test --locked -p persistence --test postgres_recall_terminal -- --ignored --test-threads=1 --nocapture
          cargo test --locked -p persistence --test postgres_durable_death -- --ignored --test-threads=1 --nocapture
          cargo test --locked -p persistence --test postgres_live_death_evidence -- --ignored --test-threads=1 --nocapture
          cargo test --locked -p server_app --test postgres_successor -- --ignored --test-threads=1 --nocapture
          cargo test --locked -p server_app --test postgres_progression_restore -- --ignored --test-threads=1
          cargo test --locked -p server_app --test postgres_world_flow -- --ignored --test-threads=1
          cargo test --locked -p server_app --test postgres_danger_crash_restore -- --ignored --test-threads=1
          cargo test --locked -p server_app --test postgres_bargain -- --ignored --test-threads=1
          cargo test --locked -p server_app --test postgres_ash_wallet -- --ignored --test-threads=1
          cargo test --locked -p server_app --test postgres_caldus_victory -- --ignored --test-threads=1
          cargo test --locked -p server_app --test postgres_field_equipment -- --ignored --test-threads=1
          cargo test --locked -p server_app --test postgres_safe_inventory -- --ignored --test-threads=1 --nocapture
          GRAVEBOUND_TELEMETRY_ENVIRONMENT=test GRAVEBOUND_TELEMETRY_REGION_ID=local-playtest cargo test --locked -p server_app --test core_private_life_journey -- --ignored --test-threads=1 --nocapture
          cargo test --locked -p support_lookup --test postgres_least_privilege -- --ignored --test-threads=1 --nocapture
          cargo test --locked -p server_app --test death_post_terminal_rejection -- --ignored --test-threads=1 --nocapture
          cargo test --locked -p server_app --test core_route_quic -- --ignored --test-threads=1 --nocapture
          cargo test --locked -p server_app --test postgres_identity -- --ignored --test-threads=1
      - name: Upload successor recovery journey evidence
        uses: actions/upload-artifact@v4
        with:
          name: gb-m03-07-successor-recovery-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/gb-m03-07-successor-recovery.json
          if-no-files-found: error
          retention-days: 14
      - name: Generate authenticated death branch and frame source evidence
        env:
          GRAVEBOUND_DEATH_CONCURRENCY_REPORT_PATH: ${{ runner.temp }}/gb-m03-13-concurrent-eligible-deaths.json
          GRAVEBOUND_DEATH_BRANCH_MATRIX_REPORT_PATH: ${{ runner.temp }}/gb-m03-06e-death-branch-matrix.json
          GRAVEBOUND_NATIVE_DEATH_FRAME_FIXTURE_PATH: ${{ runner.temp }}/gb-m03-06e-native-death-frame-fixture.json
        run: |
          cargo test --locked -p server_app --test death_branch_matrix -- --ignored --test-threads=1 --nocapture
          cargo test --locked -p server_app --test death_concurrency -- --ignored --test-threads=1 --nocapture
          cargo test --locked -p server_app --test death_custody_matrix -- --ignored --test-threads=1 --nocapture
      - name: Upload authenticated death evidence source
        uses: actions/upload-artifact@v4
        with:
          name: gb-m03-06e-death-source-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            ${{ runner.temp }}/gb-m03-06e-death-branch-matrix.json
            ${{ runner.temp }}/gb-m03-06e-native-death-frame-fixture.json
            ${{ runner.temp }}/gb-m03-13-concurrent-eligible-deaths.json
          if-no-files-found: error
          retention-days: 14

  m03-native-death-frame:
    name: GB-M03-06E optimized native death frames
    needs: postgres-persistence
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RUSTFLAGS: -C link-arg=-fuse-ld=lld
      CARGO_INCREMENTAL: "0"
      CARGO_PROFILE_RELEASE_DEBUG: "0"
    steps:
      - uses: actions/checkout@v5
      - name: Install optimized native rendering dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes clang lld libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev libxkbcommon-x11-0 mesa-vulkan-drivers vulkan-tools xvfb xauth
      - name: Install pinned Rust toolchain
        run: rustup show active-toolchain
      - name: Download authenticated death evidence source
        uses: actions/download-artifact@v4
        with:
          name: gb-m03-06e-death-source-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/gb-m03-06e-death-source
      - name: Build optimized native client
        run: cargo build --locked --release -p client_bevy
      - name: Capture standard and reduced-effects native death frames
        shell: bash
        env:
          WGPU_BACKEND: vulkan
          LIBGL_ALWAYS_SOFTWARE: "1"
          WINIT_UNIX_BACKEND: x11
        run: |
          software_icd="$(find /usr/share/vulkan/icd.d -name 'lvp_icd*.json' -print -quit)"
          test -n "${software_icd}"
          export VK_ICD_FILENAMES="${software_icd}"
          fixture="${RUNNER_TEMP}/gb-m03-06e-death-source/gb-m03-06e-native-death-frame-fixture.json"
          output="${RUNNER_TEMP}/gb-m03-06e-native-death-frame"
          mkdir -p "${output}"
          xvfb-run -a -s "-screen 0 1280x720x24" vulkaninfo --summary
          for mode in standard reduced; do
            for viewport in 1280x720 1920x1080; do
              width="${viewport%x*}"
              height="${viewport#*x}"
              reduced_flag=()
              if [[ "${mode}" == "reduced" ]]; then
                reduced_flag=(--reduced-effects)
              fi
              xvfb-run -a -s "-screen 0 ${viewport}x24" \
                ./target/release/client_bevy core-death-frame-probe \
                --fixture "${fixture}" \
                --screenshot "${output}/${mode}-${viewport}.png" \
                --report "${output}/${mode}-${viewport}.json" \
                --content-root content \
                --width "${width}" \
                --height "${height}" \
                --ui-scale 100 \
                --timeout-ms 20000 \
                "${reduced_flag[@]}"
            done
          done
          test "$(find "${output}" -maxdepth 1 -type f -name '*.png' | wc -l)" -eq 4
          test "$(find "${output}" -maxdepth 1 -type f -name '*.json' | wc -l)" -eq 4
      - name: Upload optimized native death frame evidence
        uses: actions/upload-artifact@v4
        with:
          name: gb-m03-06e-native-death-frame-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/gb-m03-06e-native-death-frame
          if-no-files-found: error
          retention-days: 14

  m03-death-soak:
    name: GB-M03-06E 30-minute death persistence soak
    if: github.event_name == 'workflow_dispatch' && inputs.run_m03_death_soak
    runs-on: ubuntu-latest
    timeout-minutes: 75
    services:
      postgres:
        image: postgres:17.10-alpine3.23
        env:
          POSTGRES_DB: gravebound_test
          POSTGRES_USER: gravebound_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 127.0.0.1:5432:5432
        options: >-
          --health-cmd "pg_isready -U gravebound_test -d gravebound_test"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30
    env:
      RUSTFLAGS: -C link-arg=-fuse-ld=lld
      CARGO_INCREMENTAL: "0"
      TEST_DATABASE_URL: postgres://gravebound_test@127.0.0.1:5432/gravebound_test
      GRAVEBOUND_ALLOW_DESTRUCTIVE_DATABASE_TESTS: "1"
    steps:
      - uses: actions/checkout@v5
      - name: Install Linux integration dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends --yes clang lld libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev
      - name: Install pinned Rust toolchain
        run: rustup show active-toolchain
      - name: Run optimized death persistence soak
        run: >-
          cargo test --locked --release -p server_app --test death_memory_soak
          death_persistence_real_quic_thirty_minute_soak --
          --ignored --nocapture --test-threads=1
