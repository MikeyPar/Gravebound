services:
  postgres:
    image: postgres:17.10-alpine3.23
    environment:
      POSTGRES_DB: gravebound_test
      POSTGRES_USER: gravebound_test
      POSTGRES_PASSWORD: ${GRAVEBOUND_POSTGRES_PASSWORD:?GRAVEBOUND_POSTGRES_PASSWORD is required}
    ports:
      - "127.0.0.1::5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gravebound_test -d gravebound_test"]
      interval: 1s
      timeout: 5s
      retries: 30
    volumes:
      - gravebound_m03_tester_data:/var/lib/postgresql/data
    restart: "no"

volumes:
  gravebound_m03_tester_data:
